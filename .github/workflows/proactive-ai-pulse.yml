name: Proactive AI Pulse

on:
  schedule:
    # 每小时运行一次 (UTC 时间，0 * * * * 表示整点)
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发测试

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Proactive AI Endpoint
        run: |
          # 自动处理可能误输入的 https://
          DOMAIN=$(echo "${{ secrets.VERCEL_DOMAIN }}" | sed -e 's|^https://||' -e 's|/$||')
          echo "Triggering https://$DOMAIN/api/proactive-ai"
          curl -X POST "https://$DOMAIN/api/proactive-ai" \
          -v \
          -f \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
